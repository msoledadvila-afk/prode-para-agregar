                        const all = [];

                        setAllPredictions(all);
                    },
                    error => console.error("Error recuperando predicciones:", error)
                );

                const globalRef = db.collection('artifacts').doc(PRODE_APP_ID).collection('public').doc('data').collection('state').doc('global');

                    doc => {
                        if (doc.exists && doc.data().matches) {

                        }
                    },
                    error => console.error("Error recuperando resultados oficiales:", error)
                );

                return () => { unsubPreds(); unsubGlobal(); };

                if (isLogged && userDocId && allPredictions.length > 0 && !hasLoadedPreds.current) {

                    if (myData && myData.userName) setUserName(myData.userName);
                    hasLoadedPreds.current = true;
                }

                    matches.forEach(m => {
                        if (m.status === 'finished' && p.preds && p.preds[m.id]) {
                            const res = calculatePoints(p.preds[m.id].home, p.preds[m.id].away, m.realHomeScore, m.realAwayScore);
                            pts += res.pts;
                            if (res.perfect) perfs += 1;
                        }
                    });
                    return { id: p.id, name: p.userName, points: pts, perfects: perfs, isMe: p.id === userDocId };
                })
                .sort((a, b) => b.points - a.points || b.perfects - a.perfects);
                setLeaderboard(newBoard);
            }, [allPredictions, matches, userDocId]);

            const calculatePoints = (predHome, predAway, realHome, realAway) => {
                if (predHome === undefined || predAway === undefined || predHome === '' || predAway === '') return { pts: 0, perfect: false };
                const pH = parseInt(predHome), pA = parseInt(predAway), rH = parseInt(realHome), rA = parseInt(realAway);
                if (pH === rH && pA === rA) return { pts: 3, perfect: true };
                const pDiff = pH - pA, rDiff = rH - rA;
                if ((pDiff > 0 && rDiff > 0) || (pDiff < 0 && rDiff < 0) || (pDiff === 0 && rDiff === 0)) return { pts: 1, perfect: false };
                return { pts: 0, perfect: false };
            };

            const showToast = (msg) => { setToast(msg); setTimeout(() => setToast(null), 3000); };

            const handleLogin = (e) => {
                e.preventDefault();
                if (userName.trim().length > 2 && userEmail.trim().length > 5 && userEmail.includes('@')) {
                    setIsLogged(true);
                    if (user) {
                        db.collection('artifacts').doc(PRODE_APP_ID).collection('public').doc('data').collection('predictions').doc(userDocId).set({ userName, email: userDocId }, { merge: true }).catch(err => console.error(err));
                    }
                } else {
                    showToast('⚠️ Ingresá un nombre y un correo válido.');
                }
            };

            const savePredictions = () => {
                const total = Object.keys(predictions).filter(id => predictions[id]?.home !== '' && predictions[id]?.away !== '').length;
                if (total === 0) { showToast('⚠️ No completaste ningún resultado.'); return; }
                if (user) {
                    db.collection('artifacts').doc(PRODE_APP_ID).collection('public').doc('data').collection('predictions').doc(userDocId).set({ userName, email: userDocId, preds: predictions, updatedAt: Date.now() }, { merge: true }).then(() => {
                        showToast('✅ ¡Pronósticos guardados en la nube!');
                    }).catch(err => console.error(err));
                }
            };

            // 👇 5. GUARDADO MAESTRO DE RESULTADOS 👇
            const saveOfficialResults = () => {
                if (user && isAdmin) {
                    // El Admin guarda en la base de datos de esta empresa
                    db.collection('artifacts').doc(PRODE_APP_ID).collection('public').doc('data').collection('state').doc('global').set({ matches: matches }, { merge: true }).then(() => {
                        showToast('👑 ¡Resultados guardados! La tabla de esta empresa se ha actualizado.');
                    }).catch(err => console.error(err));
                }
            };

            const handleOfficialScoreChange = (matchId, team, value) => {
                const val = value === '' ? null : parseInt(value);
                setMatches(prev => prev.map(m => {
                    if (m.id === matchId) {
                        const updated = { ...m, [team === 'home' ? 'realHomeScore' : 'realAwayScore']: val };
                        if (updated.realHomeScore !== null && updated.realAwayScore !== null) {
                            updated.status = 'finished';
                        } else {
                            updated.status = 'pending';
                        }
                        return updated;
                    }
                    return m;
                }));
            };

            const confirmLogout = () => {
                setShowLogoutModal(false);
                setIsLogged(false);
                setUserName('');
                setUserEmail('');
                setPredictions({});
                hasLoadedPreds.current = false;
            };

            const tournamentStandings = useMemo(() => {
                const standings = {};
                Object.entries(TOURNAMENT_GROUPS).forEach(([groupName, teams]) => {
                    teams.forEach(team => {
                        standings[team.name] = { name: team.name, code: team.code, group: groupName, pts: 0, pj: 0, gf: 0, gc: 0 };
                    });
                });

                matches.forEach(m => {
                    if (m.stage !== 'grupos' || !standings[m.home] || !standings[m.away]) return;
                    
                    if (m.status === 'finished') {
                        const h = parseInt(m.realHomeScore), a = parseInt(m.realAwayScore);
                        standings[m.home].pj++; standings[m.away].pj++;
                        standings[m.home].gf += h; standings[m.home].gc += a;
                        standings[m.away].gf += a; standings[m.away].gc += h;
                        if (h > a) standings[m.home].pts += 3;
                        else if (h < a) standings[m.away].pts += 3;
                        else { standings[m.home].pts++; standings[m.away].pts++; }
                    }
                });

                const groupedStandings = {};
                Object.keys(TOURNAMENT_GROUPS).forEach(g => {
                    groupedStandings[g] = Object.values(standings)
                        .filter(t => t.group === g)
                        .sort((a, b) => {
                            if (b.pts !== a.pts) return b.pts - a.pts;
                            const diffA = a.gf - a.gc, diffB = b.gf - b.gc;
                            if (diffB !== diffA) return diffB - diffA;
                            return b.gf - a.gf;
                        });
                });
                return groupedStandings;
            }, [matches]);

            const matchesToShow = matches.filter(m => m.stage === activeStage);

            if (!isLogged) {
                return (
                    <div className="flex flex-col items-center justify-center p-4 font-sans relative" style={{ minHeight: '100vh' }}>
                        {toast && (
                            <div className="absolute top-10 bg-red-600 text-white px-6 py-3 rounded-full shadow-xl flex items-center gap-2 animate-bounce border border-red-800">
                                <AlertCircle className="w-5 h-5 text-white" />
                                <span className="font-bold text-sm whitespace-nowrap">{toast}</span>
                            </div>
                        )}
                        <div className="max-w-md w-full bg-white p-8 rounded-3xl shadow-2xl text-center relative overflow-hidden border-4 border-sky-200">
                            <div className="absolute top-0 left-0 w-full h-2 bg-gradient-to-r from-sky-300 via-white to-sky-300"></div>
                            
                            <div className="bg-white p-2 rounded-2xl inline-block mb-4 shadow-md border border-sky-100">
                                {/* 👇 6. LOGO DE QUILMES EN INICIO 👇 */}
                                <img src="image_bb3a4f.png" alt="Logo Empresa" className="w-20 h-20 object-contain" onError={(e) => { e.target.onerror = null; e.target.src = 'https://via.placeholder.com/80?text=Logo' }} />
                            </div>
                            
                            {/* 👇 7. TEXTOS DE QUILMES 👇 */}
                            <h1 className="text-3xl font-extrabold text-sky-900 mb-2">AM Quilmes</h1>
                            <p className="text-sky-600 font-medium mb-6">Prode Mundial 2026 🇦🇷</p>
                            
                            <form onSubmit={handleLogin} className="space-y-3">
                                <div>
                                    <input
                                        type="text"
                                        placeholder="Tu nombre (ej: Nacho)"
                                        value={userName}
                                        onChange={(e) => setUserName(e.target.value)}
                                        className="w-full bg-sky-50 border-2 border-sky-200 rounded-xl px-4 py-4 text-sky-900 focus:outline-none focus:border-sky-500 focus:ring-2 focus:ring-sky-200 text-center text-lg font-medium placeholder-sky-400 mb-3"
                                        autoFocus
                                    />
                                    <input
                                        type="email"
                                        placeholder="Tu correo electrónico"
                                        value={userEmail}
                                        onChange={(e) => setUserEmail(e.target.value)}
                                        className="w-full bg-sky-50 border-2 border-sky-200 rounded-xl px-4 py-4 text-sky-900 focus:outline-none focus:border-sky-500 focus:ring-2 focus:ring-sky-200 text-center text-lg font-medium placeholder-sky-400"
                                    />
                                </div>
                                <button
                                    type="submit"
                                    disabled={userName.trim().length < 3 || userEmail.trim().length < 5 || !userEmail.includes('@') || !user}
                                    className="w-full bg-[#74ACDF] hover:bg-sky-500 disabled:opacity-50 text-white font-bold text-lg py-4 rounded-xl shadow-md hover:shadow-lg transition-all flex items-center justify-center gap-2 mt-2"
                                >
                                    {user ? <React.Fragment>Entrar a la Cancha <ChevronRight className="w-5 h-5" /></React.Fragment> : 'Conectando...'}
                                </button>
                                <p className="text-xs text-sky-600 font-medium mt-4 px-2">
                                    Usaremos tu correo como "Llave Mágica" para recuperar tus pronósticos desde cualquier dispositivo.
                                </p>
                            </form>
                        </div>
                    </div>
                );
            }

            return (
                <div className="pb-32" style={{ minHeight: '100vh' }}>
                    {/* Header Principal */}
                    <header className="bg-[#74ACDF] shadow-md sticky top-0 z-20">
                        <div className="max-w-2xl mx-auto px-4 py-4 flex justify-between items-center">
                            <div className="flex items-center gap-3">
                                {/* 👇 8. LOGO DE QUILMES EN HEADER 👇 */}
                                <img src="image_bb3a4f.png" alt="Logo" className="w-9 h-9 object-contain bg-white rounded-lg p-1 shadow-sm" onError={(e) => { e.target.onerror = null; e.target.src = 'https://via.placeholder.com/36?text=Logo' }} />
                                <h1 className="text-xl font-black text-white tracking-wide drop-shadow-sm">AMQ Prode</h1>
                            </div>
                            <div className="flex items-center gap-2">
                                <span className="flex items-center gap-1 text-[10px] text-sky-100 font-bold uppercase tracking-wider"><Cloud className="w-4 h-4" /></span>
                                <div className="bg-white/20 px-3 py-1.5 rounded-full text-sm font-bold text-white border border-sky-300 shadow-sm">
                                    {userName}
                                </div>
                                <button onClick={() => setShowLogoutModal(true)} className="ml-1 p-1.5 bg-sky-700/50 hover:bg-red-500 rounded-full text-white transition-colors" title="Abandonar Cancha">
                                    <LogOutIcon className="w-4 h-4" />
                                </button>
                            </div>
                        </div>
                    </header>

                    <main className="max-w-2xl mx-auto px-4 py-6">
                        {showLogoutModal && (
                            <div className="fixed inset-0 bg-slate-900/80 z-50 flex items-center justify-center p-4">
                                <div className="bg-white rounded-3xl p-6 max-w-sm w-full text-center shadow-2xl border-4 border-sky-100">
                                    <div className="bg-red-100 p-3 rounded-full inline-block mb-4">
                                        <LogOutIcon className="w-8 h-8 text-red-500" />
                                    </div>
                                    <h3 className="text-xl font-black text-sky-900 mb-2">¿Abandonar la cancha?</h3>
                                    <p className="text-slate-600 text-sm mb-6 font-medium">Volverás a la pantalla de inicio. Recordá usar el mismo correo (<b>{userEmail}</b>) cuando quieras volver a entrar a tu cuenta.</p>
                                    <div className="flex gap-3">
                                        <button onClick={() => setShowLogoutModal(false)} className="flex-1 bg-slate-100 hover:bg-slate-200 text-slate-700 font-bold py-3 rounded-xl transition-colors">Me quedo</button>
                                        <button onClick={confirmLogout} className="flex-1 bg-red-500 hover:bg-red-600 text-white font-bold py-3 rounded-xl shadow-md transition-colors">Sí, salir</button>
                                    </div>
                                </div>
                            </div>
                        )}

                        {toast && (
                            <div className="fixed top-24 left-1/2 -translate-x-1/2 bg-sky-800 text-white px-6 py-3 rounded-full shadow-xl flex items-center gap-2 z-50 animate-bounce border border-sky-600">
                                <CheckCircle2 className="w-5 h-5 text-sky-300" />
                                <span className="font-bold text-sm whitespace-nowrap">{toast}</span>
                            </div>
                        )}

                        {/* Pestaña: Mundial */}
                        {activeTab === 'inicio' && (
                            <div className="space-y-6">
                                <div className="bg-white/95 p-4 rounded-xl shadow-sm border border-sky-100 backdrop-blur-sm">
                                    <h2 className="text-2xl font-black text-sky-900 mb-1">Mundial 2026</h2>
                                    <p className="text-sky-600 font-medium text-sm">Fase de Grupos (A a L) - Rendimiento Real.</p>
                                </div>
                                
                                {Object.entries(tournamentStandings).map(([groupName, teams]) => (
                                    <div key={groupName} className="bg-white rounded-2xl border border-sky-200 shadow-sm overflow-hidden mb-6">
                                        <div className="bg-[#74ACDF] text-white px-4 py-2 font-black text-sm uppercase tracking-wider flex items-center gap-2">
                                            <Globe className="w-4 h-4 text-sky-100"/> Grupo {groupName}
                                        </div>
                                        <table className="w-full text-left border-collapse">
                                            <thead>
                                                <tr className="bg-sky-50 border-b border-sky-200 text-[10px] text-sky-700 uppercase font-bold">
                                                    <th className="p-3 w-8 text-center">#</th>
                                                    <th className="p-3">Equipo</th>
                                                    <th className="p-3 text-center">PJ</th>
                                                    <th className="p-3 text-center">DIF</th>
                                                    <th className="p-3 text-right text-sky-900">PTS</th>
                                                </tr>
                                            </thead>
                                            <tbody className="divide-y divide-sky-100">
                                                {teams.map((team, i) => (
                                                    <tr key={team.name} className={`transition-colors ${i < 2 ? 'bg-green-50/40 hover:bg-green-100/60' : 'hover:bg-sky-50'}`}>
                                                        <td className={`p-3 text-center font-bold text-sm ${i < 2 ? 'text-green-600' : 'text-sky-500'}`}>{i + 1}</td>
                                                        <td className="p-3 font-bold text-slate-700 flex items-center gap-2 text-sm">
                                                            <img src={`https://flagcdn.com/w20/${team.code}.png`} alt={team.name} className="w-6 h-4 object-cover shadow-sm rounded-sm border border-slate-200" />
                                                            {team.name}
                                                        </td>
                                                        <td className="p-3 text-center text-slate-500 text-sm">{team.pj}</td>
                                                        <td className="p-3 text-center text-slate-500 text-sm font-medium">{team.gf - team.gc > 0 ? `+${team.gf - team.gc}` : team.gf - team.gc}</td>
                                                        <td className="p-3 text-right font-black text-sky-700 text-base">{team.pts}</td>
                                                    </tr>
                                                ))}
                                            </tbody>
                                        </table>
                                    </div>
                                ))}
                            </div>
                        )}

                        {/* Pestaña: Pronósticos */}
                        {activeTab === 'pronosticos' && (
                            <div className="space-y-6">
                                <div className="bg-white/95 p-4 rounded-xl shadow-sm border border-sky-100 backdrop-blur-sm">
                                    <h2 className="text-2xl font-black text-sky-900">Pronósticos</h2>
                                    <p className="text-sky-600 font-medium text-sm">Cargá tus resultados por fase.</p>
                                </div>

                                <div className="flex overflow-x-auto pb-2 gap-2 hide-scrollbar">
                                    {stagesList.map(stage => (
                                        <button 
                                            key={stage.id} 
                                            onClick={() => setActiveStage(stage.id)}
                                            className={`whitespace-nowrap px-4 py-2 rounded-full text-sm font-bold transition-all shadow-sm ${activeStage === stage.id ? 'bg-[#74ACDF] text-white shadow-md' : 'bg-white text-sky-700 border border-sky-200 hover:bg-sky-50'}`}
                                        >
                                            {stage.label}
                                        </button>
                                    ))}
                                </div>

                                <div className="space-y-4">
                                    {matchesToShow.map(match => {
                                        const pred = predictions[match.id] || { home: '', away: '' };
                                        const isFinished = match.status === 'finished';
                                        const isLocked = isMatchLocked(match.date);
                                        const disableInputs = isFinished || isLocked;
                                        
                                        let resultBadge = null;
                                        if (isFinished && pred.home !== '' && pred.away !== '') {
                                            const result = calculatePoints(pred.home, pred.away, match.realHomeScore, match.realAwayScore);
                                            if (result.perfect) resultBadge = <span className="text-[10px] font-black text-white bg-green-500 px-2 py-0.5 rounded-md shadow-sm ml-2">PLENO +3</span>;
                                            else if (result.pts === 1) resultBadge = <span className="text-[10px] font-black text-white bg-blue-500 px-2 py-0.5 rounded-md shadow-sm ml-2">ACIERTO +1</span>;
                                            else resultBadge = <span className="text-[10px] font-black text-white bg-red-400 px-2 py-0.5 rounded-md shadow-sm ml-2">NADA 0</span>;
                                        }

                                        return (
                                            <div key={match.id} className="bg-white rounded-2xl p-4 border border-sky-200 shadow-sm relative">
                                                <div className="flex justify-between items-center text-xs font-bold text-sky-600 mb-4 uppercase tracking-wider">
                                                    <span>{match.date}</span>
                                                    {isFinished ? (
                                                        <span className="text-slate-500 flex items-center">FINAL {resultBadge}</span>
                                                    ) : isLocked ? (
                                                        <span className="text-red-500 flex items-center gap-1" title="Apuestas cerradas 30 min antes"><Lock className="w-3 h-3" /> CERRADO</span>
                                                    ) : (
                                                        <span className="text-yellow-600">PENDIENTE</span>
                                                    )}
                                                </div>
                                                
                                                <div className="flex justify-between items-center gap-2">
                                                    <div className="flex flex-col items-center flex-1 w-1/3 text-center">
                                                        <FlagDisplay source={match.homeFlag} name={match.home} />
                                                        <span className="font-bold text-slate-700 text-sm leading-tight">{match.home}</span>
                                                    </div>
                                                    
                                                    <div className="flex items-center gap-2" onClick={() => { if(isLocked && !isFinished) showToast('⏳ Partido bloqueado. Cierra 30 minutos antes del inicio.') }}>
                                                        <input type="number" min="0" value={pred.home} onChange={(e) => setPredictions(p => ({...p, [match.id]: {...p[match.id], home: e.target.value}}))} disabled={disableInputs} className="w-12 h-14 bg-sky-50 border-2 border-sky-200 rounded-xl text-center text-xl font-black text-sky-900 focus:border-sky-500 focus:ring-2 focus:ring-sky-200 disabled:opacity-50 disabled:bg-slate-100 disabled:cursor-not-allowed shadow-inner" />
                                                        <span className="text-sky-300 font-black">-</span>
                                                        <input type="number" min="0" value={pred.away} onChange={(e) => setPredictions(p => ({...p, [match.id]: {...p[match.id], away: e.target.value}}))} disabled={disableInputs} className="w-12 h-14 bg-sky-50 border-2 border-sky-200 rounded-xl text-center text-xl font-black text-sky-900 focus:border-sky-500 focus:ring-2 focus:ring-sky-200 disabled:opacity-50 disabled:bg-slate-100 disabled:cursor-not-allowed shadow-inner" />
                                                    </div>
                                                    
                                                    <div className="flex flex-col items-center flex-1 w-1/3 text-center">
                                                        <FlagDisplay source={match.awayFlag} name={match.away} />
                                                        <span className="font-bold text-slate-700 text-sm leading-tight">{match.away}</span>
                                                    </div>
                                                </div>
                                                
                                                {isFinished && <div className="mt-4 pt-3 border-t border-sky-100 text-center text-sm font-medium text-slate-500">Resultado Oficial: <span className="font-black text-sky-700">{match.realHomeScore} - {match.realAwayScore}</span></div>}
                                            </div>
                                        );
                                    })}
                                </div>
                                <button onClick={savePredictions} className="w-full bg-[#74ACDF] hover:bg-sky-500 text-white font-black py-4 rounded-xl flex justify-center items-center gap-2 shadow-md hover:shadow-lg transition-all sticky bottom-24"><Cloud className="w-5 h-5" /> Guardar Pronósticos</button>
                            </div>
                        )}

                        {/* Pestaña: Ranking */}
                        {activeTab === 'ranking' && (
                            <div className="space-y-4">
                                <div className="bg-white/95 p-4 rounded-xl shadow-sm border border-sky-100 backdrop-blur-sm">
                                    <h2 className="text-2xl font-black text-sky-900 mb-1">Tabla AM Quilmes</h2>
                                </div>
                                <div className="bg-white rounded-2xl border border-sky-200 shadow-sm overflow-hidden">
                                    <table className="w-full text-left border-collapse">
                                        <thead>
                                            <tr className="bg-sky-100/50 border-b border-sky-200 text-xs text-sky-700 uppercase font-bold">
                                                <th className="p-4 text-center">#</th>
                                                <th className="p-4">Jugador</th>
                                                <th className="p-4 text-right text-sky-900">Pts</th>
                                            </tr>
                                        </thead>
                                        <tbody className="divide-y divide-sky-100">
                                            {leaderboard.length === 0 ? <tr><td colSpan="3" className="p-8 text-center text-slate-500 font-medium">Aún no hay participantes.<br/>¡Cargá los tuyos!</td></tr> :
                                                leaderboard.map((u, i) => (
                                                    <tr key={u.id} className={`hover:bg-sky-50 transition-colors ${u.isMe ? 'bg-sky-100/50 border-l-4 border-l-sky-500' : ''}`}>
                                                        <td className="p-4 text-center font-bold text-slate-500">
                                                            {i === 0 ? '🏆' : i === 1 ? '🥈' : i === 2 ? '🥉' : i + 1}
                                                        </td>
                                                        <td className="p-4 font-bold text-slate-700">
                                                            {u.name} {u.isMe && <span className="text-[10px] font-black bg-[#74ACDF] text-white px-2 py-0.5 rounded-full ml-2 shadow-sm">VOS</span>}
                                                        </td>
                                                        <td className="p-4 text-right font-black text-sky-600 text-lg">{u.points}</td>
                                                    </tr>
                                                ))
                                            }
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        )}

                        {/* Pestaña: Reglas */}
                        {activeTab === 'reglas' && (
                            <div className="space-y-4">
                                <div className="bg-white/95 p-4 rounded-xl shadow-sm border border-sky-100 backdrop-blur-sm">
                                    <h2 className="text-2xl font-black text-sky-900">Reglas del Prode</h2>
                                </div>
                                <div className="bg-white border-2 border-green-200 p-5 rounded-2xl shadow-sm relative overflow-hidden">
                                    <div className="absolute top-0 right-0 bg-green-500 text-white font-black px-3 py-1 rounded-bl-lg text-xs">3 PUNTOS</div>
                                    <h3 className="text-lg font-black text-slate-800 flex items-center gap-2"><CheckCircle2 className="w-5 h-5 text-green-500"/> El Pleno</h3>
                                    <p className="text-slate-600 font-medium text-sm mt-2">Acertás el resultado exacto (ej: ponés 2-0 y sale 2-0).</p>
                                </div>
                                <div className="bg-white border-2 border-blue-200 p-5 rounded-2xl shadow-sm relative overflow-hidden">
                                    <div className="absolute top-0 right-0 bg-blue-500 text-white font-black px-3 py-1 rounded-bl-lg text-xs">1 PUNTO</div>
                                    <h3 className="text-lg font-black text-slate-800 flex items-center gap-2"><AlertCircle className="w-5 h-5 text-blue-500"/> El Acierto</h3>
                                    <p className="text-slate-600 font-medium text-sm mt-2">Acertás al ganador o si hay empate (ej: ponés 1-0 y sale 3-0).</p>
                                </div>
                                <div className="bg-white/95 border border-sky-200 p-5 rounded-2xl shadow-sm backdrop-blur-sm">
                                    <h3 className="font-bold text-sky-900 mb-2 text-sm uppercase">Detalles del Formato (48 equipos)</h3>
                                    <ul className="text-sky-800 text-sm space-y-2 list-disc list-inside font-medium">
                                        <li>Los puntos en eliminatorias se cuentan por el resultado de los 90 minutos reglamentarios.</li>
                                        <li>Las apuestas de cada partido se bloquean <b>30 minutos antes</b> de su inicio (Hora de Argentina).</li>
                                        <li>El botón de "Guardar" guarda los cambios de <b>todas las fases juntas</b>.</li>
                                    </ul>
                                </div>
                            </div>
                        )}

                        {/* Pestaña Secreta: Panel Admin */}
                        {activeTab === 'admin' && isAdmin && (
                            <div className="space-y-6">
                                <div className="bg-white/95 p-4 rounded-xl shadow-sm border border-sky-100 backdrop-blur-sm">
                                    <h2 className="text-2xl font-black text-red-600">Carga Maestra de Resultados</h2>
                                    <p className="text-slate-600 font-medium text-sm">⚠️ Los resultados guardados aquí actualizarán las tablas de todas tus empresas.</p>
                                </div>

                                <div className="flex overflow-x-auto pb-2 gap-2 hide-scrollbar">
                                    {stagesList.map(stage => (
                                        <button 
                                            key={stage.id} 
                                            onClick={() => setActiveStage(stage.id)}
                                            className={`whitespace-nowrap px-4 py-2 rounded-full text-sm font-bold transition-all shadow-sm ${activeStage === stage.id ? 'bg-red-600 text-white shadow-md' : 'bg-white text-red-700 border border-red-200 hover:bg-red-50'}`}
                                        >
                                            {stage.label}
                                        </button>
                                    ))}
                                </div>

                                <div className="space-y-4">
                                    {matches.filter(m => m.stage === activeStage).map(match => (
                                        <div key={match.id} className="bg-white rounded-2xl p-4 border-2 border-red-200 shadow-sm relative">
                                            <div className="flex justify-between text-xs font-bold text-slate-500 mb-4">
                                                <span>Partido {match.id} | {match.date}</span>
                                            </div>
                                            <div className="flex justify-between items-center gap-2">
                                                <div className="flex flex-col items-center flex-1 w-1/3 text-center">
                                                    <FlagDisplay source={match.homeFlag} name={match.home} />
                                                    <span className="font-bold text-slate-700 text-xs leading-tight">{match.home}</span>
                                                </div>
                                                <div className="flex items-center gap-2">
                                                    <input type="number" min="0" value={match.realHomeScore !== null ? match.realHomeScore : ''} onChange={(e) => handleOfficialScoreChange(match.id, 'home', e.target.value)} className="w-12 h-12 bg-red-50 border-2 border-red-300 rounded-xl text-center text-xl font-black text-red-900 focus:border-red-500" placeholder="-" />
                                                    <span className="text-red-300 font-black">-</span>
                                                    <input type="number" min="0" value={match.realAwayScore !== null ? match.realAwayScore : ''} onChange={(e) => handleOfficialScoreChange(match.id, 'away', e.target.value)} className="w-12 h-12 bg-red-50 border-2 border-red-300 rounded-xl text-center text-xl font-black text-red-900 focus:border-red-500" placeholder="-" />
                                                </div>
                                                <div className="flex flex-col items-center flex-1 w-1/3 text-center">
                                                    <FlagDisplay source={match.awayFlag} name={match.away} />
                                                    <span className="font-bold text-slate-700 text-xs leading-tight">{match.away}</span>
                                                </div>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                                <button onClick={saveOfficialResults} className="w-full bg-red-600 hover:bg-red-700 text-white font-black py-4 rounded-xl flex justify-center items-center gap-2 shadow-lg sticky bottom-24 transition-all">
                                    <AlertCircle className="w-5 h-5" /> Publicar Resultados Oficiales
                                </button>
                            </div>
                        )}
                    </main>

                    {/* Navbar Inferior */}
                    <nav className="fixed bottom-0 w-full bg-white border-t border-sky-200 shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.05)] pb-safe z-30">
                        <div className="max-w-2xl mx-auto flex justify-around p-2">
                            {[{id:'inicio', icon: Globe, label: 'Mundial'}, {id:'pronosticos', icon: Calendar, label: 'Partidos'}, {id:'ranking', icon: Trophy, label: 'Ranking'}, {id:'reglas', icon: Info, label: 'Reglas'}]
                            .concat(isAdmin ? [{id:'admin', icon: AlertCircle, label: 'Admin'}] : [])
                            .map(tab => (
                                <button key={tab.id} onClick={() => setActiveTab(tab.id)} className={`flex flex-col items-center gap-1 p-3 rounded-xl transition-colors ${isAdmin ? 'w-1/5' : 'w-1/4'} ${activeTab === tab.id ? (tab.id === 'admin' ? 'text-red-600 bg-red-50' : 'text-[#74ACDF] bg-sky-50') : 'text-slate-400 hover:text-[#74ACDF]'}`}>
                                    <tab.icon className="w-6 h-6" /><span className="text-[10px] font-black uppercase tracking-wider">{tab.label}</span>
                                </button>
                            ))}
                        </div>
                    </nav>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
    
    <style>
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</body>
</html>
